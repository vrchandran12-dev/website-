<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Not found — Veera Ravichandran</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" />
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fbfaf6;
        color: #0a0e1a;
        font-family: "Inter", system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      h1 {
        font-family: "Fraunces", Georgia, serif;
        font-style: italic;
        font-weight: 500;
        font-size: clamp(60px, 14vw, 160px);
        letter-spacing: -0.04em;
        margin: 0;
        line-height: 1;
      }
      p { margin: 18px 0 28px; color: #5a6478; max-width: 40ch; }
      a {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 12px 20px;
        border: 1px solid #0a0e1a;
        border-radius: 10px;
        color: #fbfaf6;
        background: #0a0e1a;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
      }
      a:hover { background: #1d3a73; border-color: #1d3a73; }
      @media (prefers-color-scheme: dark) {
        body { background: #0b0e16; color: #f0ebe1; }
        p { color: #9aa3b8; }
        a { background: #f0ebe1; color: #0b0e16; border-color: #f0ebe1; }
        a:hover { background: #82a9ff; border-color: #82a9ff; color: #0b0e16; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>That page doesn't exist — but the rest of the site does.</p>
      <a href="/website-/">← Back to Veera's site</a>
    </main>
  </body>
</html>
